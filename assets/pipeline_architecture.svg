<svg viewBox="0 0 1180 460" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1180" height="460" fill="#ffffff"/>

  <!-- Inputs -->
  <rect x="30" y="40" width="180" height="70" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">Medical Image</text>
  <text x="120" y="88" text-anchor="middle" font-size="12" fill="#1e3a8a">(chest X-ray, MRI, ...)</text>

  <rect x="30" y="340" width="180" height="70" rx="10" fill="#fef3f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="120" y="368" text-anchor="middle" font-size="14" font-weight="600" fill="#7f1d1d">Expert Scanpath</text>
  <text x="120" y="388" text-anchor="middle" font-size="12" fill="#7f1d1d">(x, y, t) fixations</text>

  <!-- Image encoder -->
  <rect x="270" y="30" width="210" height="90" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="375" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#14532d">DINOv3Encoder</text>
  <text x="375" y="78" text-anchor="middle" font-size="11" fill="#14532d">frozen backbone +</text>
  <text x="375" y="93" text-anchor="middle" font-size="11" fill="#14532d">trainable extra block</text>

  <!-- Scanpath encoder -->
  <rect x="270" y="330" width="210" height="90" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="375" y="358" text-anchor="middle" font-size="14" font-weight="600" fill="#7c2d12">ScanpathTransformer</text>
  <text x="375" y="378" text-anchor="middle" font-size="11" fill="#7c2d12">encoder-decoder over</text>
  <text x="375" y="393" text-anchor="middle" font-size="11" fill="#7c2d12">fixation sequences</text>

  <!-- patch tokens / cls token -->
  <rect x="540" y="20" width="170" height="50" rx="8" fill="#ecfdf5" stroke="#22c55e" stroke-width="1.2"/>
  <text x="625" y="50" text-anchor="middle" font-size="12" fill="#14532d">patch_tokens [N,D]</text>

  <rect x="540" y="90" width="170" height="50" rx="8" fill="#ecfdf5" stroke="#22c55e" stroke-width="1.2"/>
  <text x="625" y="120" text-anchor="middle" font-size="12" fill="#14532d">cls_token [D]</text>

  <rect x="540" y="345" width="170" height="60" rx="8" fill="#fef9ec" stroke="#f97316" stroke-width="1.2"/>
  <text x="625" y="368" text-anchor="middle" font-size="12" fill="#7c2d12">scanpath embedding</text>
  <text x="625" y="384" text-anchor="middle" font-size="11" fill="#7c2d12">sp_emb [D]</text>

  <!-- Mask generator -->
  <rect x="760" y="220" width="200" height="90" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="860" y="250" text-anchor="middle" font-size="14" font-weight="600" fill="#4c1d95">ViTMaskGenerator</text>
  <text x="860" y="270" text-anchor="middle" font-size="11" fill="#4c1d95">cross-attention decoder</text>
  <text x="860" y="285" text-anchor="middle" font-size="11" fill="#4c1d95">gaze -&gt; [37x37] mask</text>

  <!-- Gaze-masked features -->
  <rect x="760" y="40" width="200" height="70" rx="10" fill="#fdf4ff" stroke="#d946ef" stroke-width="1.5"/>
  <text x="860" y="68" text-anchor="middle" font-size="13" font-weight="600" fill="#701a75">Gaze-weighted</text>
  <text x="860" y="86" text-anchor="middle" font-size="11" fill="#701a75">patch_tokens x mask</text>

  <!-- Classifier -->
  <rect x="1000" y="40" width="150" height="70" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="1075" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#312e81">Classifier</text>
  <text x="1075" y="86" text-anchor="middle" font-size="11" fill="#312e81">class logits</text>

  <!-- Contrastive alignment -->
  <rect x="760" y="120" width="200" height="70" rx="10" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="860" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#881337">Contrastive Loss</text>
  <text x="860" y="166" text-anchor="middle" font-size="11" fill="#881337">image emb &lt;-&gt; sp_emb</text>

  <!-- Arrows -->
  <path d="M210,75 L270,75" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)" fill="none"/>
  <path d="M210,375 L270,375" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)" fill="none"/>

  <path d="M480,55 C510,55 510,45 540,45" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)" fill="none"/>
  <path d="M480,90 C510,90 510,115 540,115" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)" fill="none"/>
  <path d="M480,375 L540,375" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)" fill="none"/>

  <path d="M625,375 C700,375 700,290 760,265" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)" fill="none"/>
  <path d="M625,155 C690,155 690,150 760,150" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)" fill="none"/>
  <path d="M625,375 C700,375 700,160 760,155" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)" fill="none"/>

  <path d="M860,220 C860,170 860,150 860,190" stroke="#475569" stroke-width="1.4" marker-end="url(#arrow)" fill="none" stroke-dasharray="4,3"/>
  <path d="M860,220 C780,200 780,90 800,75" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)" fill="none"/>

  <path d="M960,75 L1000,75" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)" fill="none"/>

  <!-- legend -->
  <text x="30" y="445" font-size="11" fill="#64748b">Figure 1. GazeAlign pipeline: a frozen image encoder and a scanpath transformer are aligned via a contrastive loss; a cross-attention</text>
  <text x="30" y="458" font-size="11" fill="#64748b">mask generator turns the scanpath embedding into a spatial attention map that re-weights image patch tokens before classification.</text>
</svg>
